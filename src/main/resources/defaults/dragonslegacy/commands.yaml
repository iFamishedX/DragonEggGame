# Commands configuration for Dragon's Legacy.

# The literal name of the root player command.
# This is the text players type after the slash, e.g. /dragonslegacy bearer.
# Default: "dragonslegacy"
root_command: "dragonslegacy"

# Aliases for the root command.
# Players can use any of these as a shortcut for the root command.
# Example: typing /dl bearer works the same as /dragonslegacy bearer.
root_aliases:
  - "dl"

# Names of the subcommands available under the root command.
# Change these to rename specific subcommands.
subcommands:
  # Shows who currently holds the Dragon Egg and their last known location.
  bearer: "bearer"

  # Lists all available Dragon's Legacy commands.
  help: "help"

  # The Dragon's Hunger ability subcommand group.
  hunger: "hunger"

  # Activates Dragon's Hunger (bearer only).
  hunger_on: "on"

  # Deactivates Dragon's Hunger (bearer only).
  hunger_off: "off"
