# Effects and attributes applied when a player is holding the egg
# but has NOT activated Dragon's Hunger.

# Status effects applied while holding the Dragon Egg (no ability needed).
# Each entry:
#   id             — Namespaced effect identifier (e.g. "minecraft:resistance").
#                    A bare name without a namespace is also accepted;
#                    "minecraft:" will be prepended automatically.
#   amplifier      — Effect level minus 1 (0 = level 1, 1 = level 2, etc.)
#   show_particles — Whether to show effect particles.
#   show_icon      — Whether to show the effect icon in the HUD.
effects:
  - id: "minecraft:resistance"
    amplifier: 0
    show_particles: false
    show_icon: false

  - id: "minecraft:saturation"
    amplifier: 0
    show_particles: false
    show_icon: false

  - id: "minecraft:glowing"
    amplifier: 0
    show_particles: false
    show_icon: false

# Attribute modifiers applied while holding the Dragon Egg (no ability needed).
# Each entry:
#   id        — Namespaced attribute identifier (e.g. "minecraft:max_health").
#               A bare name without a namespace is also accepted;
#               "minecraft:" will be prepended automatically.
#   amount    — The modifier value.
#   operation — How the amount is applied. Accepted values:
#                 "add_value"      — Adds amount directly to the base value.
#                 "multiply_base"  — Multiplies the base value by (1 + amount).
#                 "multiply_total" — Multiplies the final value by (1 + amount).
attributes:
  - id: "minecraft:max_health"
    amount: 4.0
    operation: "add_value"

  - id: "minecraft:movement_speed"
    amount: 0.05
    operation: "multiply_total"
