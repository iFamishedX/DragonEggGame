# Spawn fallback and BlueMap marker configuration for Dragon's Legacy.

# When true, teleports or spawns the Dragon Egg to world spawn if it
# cannot be located anywhere in the world.
# Note: the egg will only be spawned if it has been legitimately created
# (i.e., the Ender Dragon has been defeated at least once).
fallback_enabled: true

# Name displayed on the BlueMap marker for the Dragon Egg.
marker_name: "Dragon Egg"

# Description shown on the BlueMap area marker when the egg location
# is randomized or approximate.
area_marker_description: "The dragon egg is somewhere in this area."

# Description shown on the BlueMap point marker when the egg location
# is exact.
point_marker_description: "Come and get it!"

# URL of the icon image used for the BlueMap point marker.
point_marker_icon: "https://minecraft.wiki/images/thumb/Dragon_Egg_JE4.png/150px-Dragon_Egg_JE4.png"

# Color of the BlueMap marker as a decimal integer.
# Default: 2818132 (purple)
# Example values:
#   16711680 - red
#   65280    - green
#   255      - blue
marker_color: 2818132
