# Announcement messages for Dragon's Legacy.
# Supports MiniMessage formatting when use_minimessage is true.
# See: https://docs.advntr.dev/minimessage/

# If true, messages will be parsed using MiniMessage.
# If false, messages are treated as plain text.
use_minimessage: true

# Announcement message templates broadcast to all online players.
# Dynamic placeholders use <tag> syntax and are resolved per event:
#   egg_picked_up            - <player>
#   egg_dropped              - (none)
#   egg_placed               - <x>, <y>, <z>
#   bearer_changed           - <player>
#   bearer_cleared           - (none)
#   egg_teleported_to_spawn  - <x>, <y>, <z>
#   ability_activated        - <player>, <seconds>
#   ability_expired          - <player>
#   ability_cooldown_started - <seconds>
#   ability_cooldown_ended   - (none)
templates:
  egg_picked_up: "<gold>[Dragon's Legacy]</gold> <white><player> has picked up the Dragon's Egg!</white>"
  egg_dropped: "<gold>[Dragon's Legacy]</gold> <white>The Dragon's Egg has been dropped!</white>"
  egg_placed: "<gold>[Dragon's Legacy]</gold> <white>The Dragon's Egg has been placed at <x>, <y>, <z>!</white>"
  bearer_changed: "<gold>[Dragon's Legacy]</gold> <white>The Dragon's Egg is now held by <player>!</white>"
  bearer_cleared: "<gold>[Dragon's Legacy]</gold> <white>The Dragon's Egg has no bearer.</white>"
  egg_teleported_to_spawn: "<gold>[Dragon's Legacy]</gold> <white>The Dragon's Egg has been returned to spawn at <x>, <y>, <z>!</white>"
  ability_activated: "<gold>[Dragon's Legacy]</gold> <white><player> has activated Dragon's Hunger for <seconds> seconds!</white>"
  ability_expired: "<gold>[Dragon's Legacy]</gold> <white>Dragon's Hunger has expired for <player>!</white>"
  ability_cooldown_started: "<gold>[Dragon's Legacy]</gold> <white>Dragon's Hunger is on cooldown for <seconds> seconds.</white>"
  ability_cooldown_ended: "<gold>[Dragon's Legacy]</gold> <white>Dragon's Hunger is ready again!</white>"

# Example - customize the egg picked up message:
# templates:
#   egg_picked_up: "<red><bold><player></bold> grabbed the Dragon's Egg!</red>"
