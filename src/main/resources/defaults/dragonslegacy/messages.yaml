# ============================================================
# Dragon's Legacy — messages.yaml
# ============================================================
#
# This file controls every message shown by the /dragonslegacy
# command system.
#
# Each message has two fields:
#
#   output: <mode>   Where the message is displayed.
#                    Allowed values:
#                      chat      — standard chat message (default)
#                      actionbar — above the hotbar
#                      bossbar   — temporary boss bar (5 s)
#                      title     — large on-screen title
#                      subtitle  — small on-screen subtitle
#
#   text: |          The message content.
#                    Supports:
#                      • MiniMessage formatting  (<gold>, <bold>, <#RRGGBB>, etc.)
#                      • PB4 Placeholder API     (%deg:bearer%, %deg:item%, etc.)
#                      • Full hex color codes    (<#FF5500>)
#                      • Multi-line text         (YAML block scalar with |)
#
# ============================================================
# MINIESSAGE REFERENCE
# ============================================================
#
#   <gold>text</>      — Named colors
#   <#FF4500>text</>   — Hex colors
#   <bold>text</>      — Bold
#   <italic>text</>    — Italic
#   <underlined>       — Underline
#   <strikethrough>    — Strikethrough
#   <obfuscated>       — Obfuscated (random characters)
#   <reset>            — Reset all formatting
#   <newline>          — Explicit newline (or use YAML multi-line)
#
# ============================================================
# PLACEHOLDER REFERENCE (PB4 Placeholder API)
# ============================================================
#
#   %deg:bearer%       — Display name of the current egg bearer
#   %deg:item%         — Translated name of the Dragon Egg item
#   %deg:pos%          — Last-known position of the bearer
#   %player_name%      — Name of the player running the command
#   (any global PB4 placeholder is also supported)
#
# ============================================================

# ----------------------------------------------------------
# /dragonslegacy help
# ----------------------------------------------------------
# Shown when a player runs /dragonslegacy help.
# Recommended output mode: chat
#
# Example:
# help:
#   output: "chat"
#   text: |
#     <gold><bold>Dragon's Legacy Commands</bold></gold>
#       /dragonslegacy help    - Show this help message
#       /dragonslegacy bearer  - Show the current bearer
#       /dragonslegacy hunger on  - Activate Dragon's Hunger
#       /dragonslegacy hunger off - Deactivate Dragon's Hunger
#
help:
  output: "chat"
  text: |
    <gold><bold>Dragon's Legacy Commands</bold></gold>
    <gray>  /dragonslegacy help</gray> - Show this help message
    <gray>  /dragonslegacy bearer</gray> - Show the current bearer
    <gray>  /dragonslegacy hunger on</gray> - Activate Dragon's Hunger
    <gray>  /dragonslegacy hunger off</gray> - Deactivate Dragon's Hunger

# ----------------------------------------------------------
# /dragonslegacy bearer — bearer found
# ----------------------------------------------------------
# Shown when there IS a current bearer.
# Recommended output mode: chat
# Available placeholders: %deg:bearer%, %deg:item%, %deg:pos%
#
# Example:
# bearer_info:
#   output: "chat"
#   text: "<yellow>The %deg:item% is held by <gold>%deg:bearer%</>."
#
bearer_info:
  output: "chat"
  text: "<yellow>The %deg:item% is currently held by <gold>%deg:bearer%</>."

# ----------------------------------------------------------
# /dragonslegacy bearer — no bearer
# ----------------------------------------------------------
# Shown when NO player currently holds the egg.
# Available placeholders: %deg:item%
#
# Example:
# bearer_none:
#   output: "chat"
#   text: "<yellow>No one holds the %deg:item% yet."
#
bearer_none:
  output: "chat"
  text: "<yellow>No one holds the %deg:item% yet."

# ----------------------------------------------------------
# /dragonslegacy hunger on — activation
# ----------------------------------------------------------
# Sent to the bearer when Dragon's Hunger is activated.
# Recommended output mode: title (dramatic effect)
# Available placeholders: %deg:bearer%, %deg:item%
#
# Example:
# hunger_activate:
#   output: "title"
#   text: "<#FF4500><bold>Dragon's Hunger!</bold></#FF4500>"
#
hunger_activate:
  output: "title"
  text: "<#FF4500><bold>Dragon's Hunger!</bold></#FF4500>"

# ----------------------------------------------------------
# /dragonslegacy hunger off — deactivation
# ----------------------------------------------------------
# Sent to the bearer when Dragon's Hunger is deactivated.
# Recommended output mode: title or actionbar
# Available placeholders: %deg:bearer%, %deg:item%
#
# Example:
# hunger_deactivate:
#   output: "title"
#   text: "<gray><italic>Dragon's Hunger fades...</italic></gray>"
#
hunger_deactivate:
  output: "title"
  text: "<gray><italic>Dragon's Hunger fades...</italic></gray>"

# ----------------------------------------------------------
# Not the bearer
# ----------------------------------------------------------
# Shown when a non-bearer player tries /dragonslegacy hunger on/off.
# Recommended output mode: actionbar (brief, non-intrusive)
# Available placeholders: %deg:bearer%, %deg:item%
#
# Example:
# not_bearer:
#   output: "actionbar"
#   text: "<red>You are not the Dragon Egg bearer!"
#
not_bearer:
  output: "actionbar"
  text: "<red>You are not the Dragon Egg bearer!"

# ----------------------------------------------------------
# Dragon's Hunger expired
# ----------------------------------------------------------
# Sent directly to the bearer when Dragon's Hunger expires naturally
# (i.e., the ability duration runs out on its own).
# Recommended output mode: title or actionbar
# Available placeholders: %deg:bearer%, %deg:item%
#
# Example:
# hunger_expired:
#   output: "title"
#   text: "<gray><italic>Dragon's Hunger has ended.</italic></gray>"
#
hunger_expired:
  output: "title"
  text: "<gray><italic>Dragon's Hunger has ended.</italic></gray>"

# ----------------------------------------------------------
# Elytra blocked
# ----------------------------------------------------------
# Sent to the bearer when they attempt to use an elytra while
# Dragon's Hunger is active and block_elytra is true in ability.yaml.
# Recommended output mode: actionbar (brief, non-intrusive)
# Available placeholders: %deg:bearer%, %deg:item%
#
# Example:
# elytra_blocked:
#   output: "actionbar"
#   text: "<red>You cannot use an elytra while Dragon's Hunger is active!"
#
elytra_blocked:
  output: "actionbar"
  text: "<red>You cannot use an elytra while Dragon's Hunger is active!"
